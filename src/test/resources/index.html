<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise API Intelligence</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root{
            --bg:#08080c;--card:#12121e;--panel:#1a1a2b;
            --pass:#00ff95;--fail:#ff0055;
            --txt:#fff;--dim:#8b8ba7;--brd:#252538;
        }

        body{font-family:Arial, sans-serif;background:var(--bg);color:var(--txt)}
        header{padding:20px 40px;border-bottom:1px solid var(--brd);font-weight:800;display:flex;justify-content:space-between;align-items:center}
        .header-title{font-size:18px}
        .header-date{font-size:14px;color:var(--dim)}
        .container{padding:30px 40px}

        /* SUMMARY CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .card{background:var(--card);padding:20px;border-radius:12px; border:1px solid var(--brd)}
        .card h2{font-size:30px;margin-top:8px}
        .pass{color:var(--pass)} .fail{color:var(--fail)}

        .donut{
            width:100px;height:100px;border-radius:50%;
            background:conic-gradient(var(--pass) 0% 0%, var(--fail) 0% 100%);
            margin:auto
        }

        /* TOOLBAR */
        .toolbar{display:flex;gap:10px;margin-bottom:15px}
        input,select{
            background:var(--panel);border:1px solid var(--brd);
            color:#fff;padding:8px 12px;border-radius:6px;outline:none; width: 200px;
        }

        /* TABLE */
        .table{background:var(--card);border-radius:12px;overflow:hidden; border:1px solid var(--brd)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:14px;border-bottom:1px solid var(--brd)}
        th{color:var(--dim);font-size:12px;text-align:left; text-transform: uppercase}

        /* BADGES */
        .badge{padding:4px 10px;border-radius:4px;font-size:12px;font-weight:700}
        .b-pass{background:#00ff9520;color:var(--pass)}
        .b-fail{background:#ff005520;color:var(--fail)}

        .scenario-row{cursor:pointer; transition: background 0.2s}
        .scenario-row:hover{background:#1a1a2b}

        /* DETAILS AREA */
        .details{display:none;background:#050508}
        tr.details.active{display:table-row}
        div.details.active{display:block}

        /* TEST CASE CARD */
        .testcase-card{
            display:flex;justify-content:space-between;align-items:center;
            background:#0f0f18;padding:12px 16px;margin:8px 0;
            border-radius:10px;border:1px solid #1f1f2f;
            cursor:pointer;transition:.2s
        }
        .testcase-card:hover{background:#151527}
        .tc-name{font-weight:600}
        .tc-right{display:flex;gap:10px;align-items:center}
        .tc-time{font-size:12px;color:#8b8ba7}

        /* STEPS & PRE */
        pre{
            background:#000;padding:12px;border-radius:6px;
            margin-top:6px;color:#9ad7ff;white-space:pre-wrap;font-family:monospace;font-size:12px;
            border-left: 3px solid #1f1f2f;
        }

        /* PAGINATION */
        .pagination{margin-top:15px;display:flex;gap:10px;justify-content:center;align-items:center}
        button{
            background:var(--panel);border:1px solid var(--brd);
            color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer
        }
        button:hover:not(:disabled){background:#252538}
        button:disabled{opacity:.3;cursor:not-allowed}
    </style>
</head>

<body>

<header>
    <div class="header-title">API INTELLIGENCE REPORT</div>
    <div class="header-date" id="reportDate"></div>
</header>

<div class="container">
    <div class="cards">
        <div class="card">SCENARIO PASS<h2 class="pass" id="scPas">0</h2></div>
        <div class="card">SCENARIO FAIL<h2 class="fail" id="scFai">0</h2></div>
        <div class="card">TC TOTAL<h2 id="tot">0</h2></div>
        <div class="card">TC PASS<h2 class="pass" id="pas">0</h2></div>
        <div class="card">TC FAIL<h2 class="fail" id="fai">0</h2></div>
        <div class="card">STABILITY<h2 id="rate">0%</h2></div>
        <div class="card" style="display: flex; align-items: center;"><div class="donut"></div></div>
    </div>

    <div class="toolbar">
        <input id="search" placeholder="Search scenario or test case...">
        <select id="statusFilter">
            <option value="ALL">All Status</option>
            <option value="PASS">PASS ONLY</option>
            <option value="FAIL">FAIL ONLY</option>
        </select>
        <select id="sortFilter">
            <option value="DEFAULT">Default Sort</option>
            <option value="FAIL_FIRST">Fail First</option>
            <option value="NAME">By Name</option>
        </select>
    </div>

    <div class="table">
        <table>
            <thead>
            <tr>
                <th style="width: 60%;">Scenario Name</th>
                <th>Status</th>
                <th>Duration</th>
            </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<script>
    /* --- DATA INJECTION POINT --- */
    const DATA = __REPORT_DATA__;

    /* --- DOM REFERENCES --- */
    const scPasEl = document.getElementById('scPas');
    const scFaiEl = document.getElementById('scFai');
    const totEl = document.getElementById('tot');
    const pasEl = document.getElementById('pas');
    const faiEl = document.getElementById('fai');
    const rateEl = document.getElementById('rate');
    const reportDateEl = document.getElementById('reportDate');
    const searchInput = document.getElementById('search');
    const statusSelect = document.getElementById('statusFilter');
    const sortSelect = document.getElementById('sortFilter');
    const tbody = document.getElementById("rows");

    /* --- UTILS --- */
    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function formatDuration(ms) {
        let val = parseInt(ms) || 0;
        if (val >= 1000) return (val / 1000).toFixed(2) + 's';
        return val + 'ms';
    }

    function getScenarioStatus(s) {
        if (!s.testCases || s.testCases.length === 0) return "PASS";
        return s.testCases.some(tc => tc.status === "FAIL") ? "FAIL" : "PASS";
    }

    function getScenarioDuration(s) {
        const totalMs = (s.testCases || []).reduce((a, b) => a + (parseInt(b.duration) || 0), 0);
        return formatDuration(totalMs);
    }

    /* --- LOGIC --- */
    function updateSummary() {
        if (!DATA || !DATA.scenarios) return;

        let tcTotal = 0, tcPassed = 0, tcFailed = 0;
        let scPassed = 0, scFailed = 0;

        DATA.scenarios.forEach(scenario => {
            let isScenarioFail = false;
            (scenario.testCases || []).forEach(tc => {
                tcTotal++;
                if (tc.status === "PASS") tcPassed++;
                else if (tc.status === "FAIL") { tcFailed++; isScenarioFail = true; }
            });
            if (isScenarioFail) scFailed++; else scPassed++;
        });

        if(totEl) totEl.innerText = tcTotal;
        if(pasEl) pasEl.innerText = tcPassed;
        if(faiEl) faiEl.innerText = tcFailed;
        if(scPasEl) scPasEl.innerText = scPassed;
        if(scFaiEl) scFaiEl.innerText = scFailed;

        const passPercent = tcTotal > 0 ? ((tcPassed / tcTotal) * 100).toFixed(1) : 0;
        if(rateEl) rateEl.innerText = passPercent + '%';

        const donut = document.querySelector('.donut');
        if (donut) {
            donut.style.background = `conic-gradient(var(--pass) 0% ${passPercent}%, var(--fail) ${passPercent}% 100%)`;
        }
    }

    let filteredData = DATA && DATA.scenarios ? [...DATA.scenarios] : [];
    let currentPage = 1;
    const pageSize = 15;

    function applyFilters() {
        const query = (searchInput.value || "").toLowerCase();
        const statusVal = statusSelect.value;

        filteredData = (DATA.scenarios || []).filter(s => {
            const nameMatch = (s.name || "").toLowerCase().includes(query);
            const tcMatch = (s.testCases || []).some(tc => (tc.name || "").toLowerCase().includes(query));
            const statusMatch = statusVal === "ALL" || getScenarioStatus(s) === statusVal;
            return (nameMatch || tcMatch) && statusMatch;
        });

        currentPage = 1;
        applySort();
    }

    function applySort() {
        if (sortSelect.value === "FAIL_FIRST") {
            filteredData.sort((a, b) => getScenarioStatus(a) === "FAIL" ? -1 : 1);
        } else if (sortSelect.value === "NAME") {
            filteredData.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
        }
        renderTable();
    }

    function renderTable() {
        if (!tbody) return;
        tbody.innerHTML = "";

        const start = (currentPage - 1) * pageSize;
        const pageItems = filteredData.slice(start, start + pageSize);

        pageItems.forEach((s, i) => {
            const scenarioId = `sc_${start + i}`;
            const status = getScenarioStatus(s);

            tbody.innerHTML += `
                <tr class="scenario-row" onclick="toggleView('${scenarioId}')">
                    <td><b>${escapeHTML(s.name)}</b></td>
                    <td><span class="badge ${status==='PASS'?'b-pass':'b-fail'}">${status}</span></td>
                    <td>${getScenarioDuration(s)}</td>
                </tr>
                <tr id="${scenarioId}" class="details">
                    <td colspan="3">
                        <div style="padding:10px 20px">
                            ${(s.testCases || []).map((tc, j) => {
                                const tcId = `tc_${start + i}_${j}`;
                                return `
                                <div class="testcase-card" onclick="toggleCase(event,'${tcId}')">
                                    <span class="tc-name">${escapeHTML(tc.name)}</span>
                                    <div class="tc-right">
                                        <span class="badge ${tc.status==='PASS'?'b-pass':'b-fail'}">${tc.status}</span>
                                        <span class="tc-time">${formatDuration(tc.duration)}</span>
                                    </div>
                                </div>
                                <div id="${tcId}" class="details" style="padding: 10px 15px">
                                    ${(tc.steps || []).map(step => `
                                        <div style="margin-bottom:12px">
                                            <b style="font-size:11px; color:var(--dim)">[${escapeHTML(step.type)}] ${escapeHTML(step.label)}</b>
                                            <pre>${escapeHTML(step.value)}</pre>
                                        </div>
                                    `).join("")}
                                </div>
                                `;
                            }).join("")}
                        </div>
                    </td>
                </tr>`;
        });
        renderPagination();
    }

    function toggleView(id) {
        const el = document.getElementById(id);
        if(el) el.classList.toggle("active");
    }

    function toggleCase(e, id) {
        e.stopPropagation();
        const el = document.getElementById(id);
        if(el) el.classList.toggle("active");
    }

    function renderPagination() {
        const total = Math.ceil(filteredData.length / pageSize) || 1;
        const pagin = document.getElementById("pagination");
        if(!pagin) return;
        pagin.innerHTML = `
            <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
            <span>Page ${currentPage} of ${total}</span>
            <button onclick="changePage(1)" ${currentPage === total ? 'disabled' : ''}>Next</button>`;
    }

    function changePage(dir) {
        currentPage += dir;
        renderTable();
    }

    /* --- INITIALIZATION --- */
    if (reportDateEl) {
        const now = new Date();
        reportDateEl.innerText = now.toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    updateSummary();
    applyFilters();

    if (searchInput) searchInput.onkeyup = applyFilters;
    if (statusSelect) statusSelect.onchange = applyFilters;
    if (sortSelect) sortSelect.onchange = applySort;
</script>

</body>
</html>
